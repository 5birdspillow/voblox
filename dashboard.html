<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5cab3e">
  <title>Voblox — Grown-up Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    #app { max-width: 820px; }
    /* push the title clear of the fixed .worldlink button (top-right) on phones */
    h1 { color:#0a3a52; text-align:center; margin:48px 0 2px; }
    /* tables scroll horizontally inside their own container — never the page */
    .tablewrap { overflow-x:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-x:contain; }
    .tablewrap table { min-width:380px; }
    .sub { text-align:center; color:#3a5566; margin-bottom:14px; }
    .stat { display:inline-block; background:#fff; border:3px solid #0002; border-bottom-width:5px;
      border-radius:12px; padding:8px 12px; margin:4px; font-weight:bold; }
    .lessonhead { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .gradebig { font-size:34px; font-weight:900; }
    .A { color:#2f9e44; } .B { color:#1c7ed6; } .low { color:#e8590c; }
    table { width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
    th, td { text-align:left; padding:6px 8px; border-bottom:1px solid #e6edf2; }
    th { color:#5a6b7a; }
    .pill { display:inline-block; padding:1px 8px; border-radius:8px; font-weight:bold; font-size:12px; }
    .ready { background:#dff5e1; color:#1c7a2e; } .notready { background:#ffe7d6; color:#a04a12; }
    .barwrap { background:#0000001a; border-radius:8px; height:14px; overflow:hidden; max-width:240px; }
    .bar { height:100%; background:linear-gradient(90deg,#76d275,#43c34a); }
    .summary { margin:8px 0; font-size:15px; }
    .row2 { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .btn { background:linear-gradient(#7ed957,#5cab3e); color:#0a2e08; border:3px solid #2f6b1f;
      border-bottom-width:6px; border-radius:12px; padding:9px 14px; font-weight:bold; cursor:pointer; text-decoration:none; }
    .btn.alt { background:linear-gradient(#9ad0ff,#5aa6f0); border-color:#2f6fb0; color:#06324f; }
  </style>
</head>
<body>
  <a class="worldlink" href="index.html">🌍 Back to game</a>
  <div id="app">
    <div id="errbar"></div>
    <h1>👪 Grown-up Dashboard</h1>
    <div class="sub">How Leo's vocabulary is going. Progress is shared with the game on this device.</div>
    <div id="dash"></div>
  </div>
  <script src="src/content.js"></script>
  <script src="src/engine.js"></script>
  <script src="src/questions.js"></script>
  <script src="src/store.js"></script>
  <script src="src/profile.js"></script>
  <script src="src/dashboard.js"></script>
</body>
</html>
